{% extends 'base.html' %}
{% block title %}Compte inactif — WIBABI{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card text-center">
      <div class="card-body p-5">
        <div style="width:72px;height:72px;background:#f4f6f9;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;">
          <i class="bi bi-slash-circle" style="font-size:2rem;color:#8a9aaa;"></i>
        </div>
        <h4 style="font-family:'Playfair Display',serif;color:var(--bleu);">Compte inactif</h4>
        <p style="color:#8a9aaa;font-size:0.88rem;margin:8px 0 24px;">
          Votre compte {% if societe %}({{ societe.nom }}) {% endif %}est actuellement inactif.
          Contactez l'administrateur système.
        </p>
        <a href="{% url 'accounts:logout' %}" class="btn btn-outline-secondary">
          <i class="bi bi-box-arrow-left me-2"></i>Se déconnecter
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
