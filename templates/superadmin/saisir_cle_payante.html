{% extends 'base.html' %}
{% block title %}Activer licence{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Activer une licence</h5>
                </div>
                <div class="card-body">

                    <p>Société : <strong>{{ societe.nom }}</strong></p>

                    <form method="post">
                        {% csrf_token %}
                        
                        <div class="mb-3">
                            <label class="form-label">Clé de licence</label>
                            <input type="text" 
                                   name="cle_activation" 
                                   class="form-control form-control-lg" 
                                   placeholder="Ex: SOD-4567-12M-AB3D4E"
                                   style="font-family: monospace; text-transform: uppercase;"
                                   required autofocus>
                        </div>

                        <button type="submit" class="btn btn-primary btn-lg w-100">
                            Activer la licence
                        </button>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
